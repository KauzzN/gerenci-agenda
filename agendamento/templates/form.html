<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendamento</title>

    <style>
    body {
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f5f6fa;
    font-family: Arial, cans-serif;
    margin: 0;
    height: 100vh;
    }

    .container {
    background-color: white;
    padding: 25px;
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    h1 {
    text-align: center;
    margin-bottom: 20px;
    }

    label {
    display: block;
    margin-bottom: 5px;
    }

    input {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    }

    .btn {
    display: inline-block;
    padding: 8px 12px;
    background-color: #f2f2f2;
    border-radius: 6px;
    text-decoration: none;
    color: black;
    border: none;
    cursor: pointer;
    transition: 0.3s all;
    }

    .btn:hover {
    background-color: #343a40;
    color: white;
    }

    .actions {
    display: flex;
    justify-content: space-between;
    }

    </style>
  </head>
  <body>
  <div class="container">

    <h1>Novo Agendamento</h1>

    <form method="post">
      {% csrf_token %}

      <!-- erro geral -->
      {% if form.non_field_errors %}
        <div style="color: red; margin-bottom: 10px;">
          {{ form.non_field_errors }}
        </div>
      {% endif %}

      <label>Nome</label>
      {{ form.nome }}

      {% if form.nome.errors %}
        <div style="color: red; margin-bottom: 10px;">
          {{ form.nome.errors }}
        </div>
      {% endif %}

      <label>Horário</label>
      {{ form.horario }}

      {% if form.horario.errors %}
        <div style="color: red; margin-bottom: 10px;">
          {{ form.horario.errors }}
        </div>
      {% endif %}

      <div class="actions">
        <button type="submit" class="btn">Salvar</button>
        <a href="/" class="btn">Voltar</a>
      </div>

    </form>
  </div>
</body>
</html><div id="">

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendamento</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background-color: white;
        gap: 5px;
      }

      .container {
        background-color: #f5f6fa;
        width: 100%;
        max-width: 800px;
        gap: 5px;
      }

      h1 {
        font-family: Arial, sans-serif;
      }

      .mb-3 {
        max-width:750px; 
        width: 100%;
        padding: 10px;
      }

      form {
        padding: 20px;
        border-radius: 10px;
      }

      .btn-success {
        padding: 10px 10px;
        background-color: #f2f2f2;
        border-radius: 6px;
        border: 1px solid #aaa;
        text-decoration: none;
        color: black;
      }

    </style>
  </head>
  <body>
 
    <h1>Novo Agendamento</h1>

    <form method="post" class="container mt-4">
      {% csrf_token %}

      <div class="mb-3">
        <label>Nome</label>
        {{ form.nome }}
      </div>

      <div class="mb-3">
        <label>Horário</label>
        {{ form.horario }}
      </div>

      <button type="submit" class="btn-success">Salvar</button>
      
    </form>

    <a href="/" class="btn-success">Voltar</a>

  </body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agendamentos</title>

  <style>
    body {
      display: flex;
      align-items: center;
      flex-direction: column;
      background-color: #f5f6fa;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
    width: 100%;
    max-width: 800px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      background-color: #f2f2f2;
      border-radius: 6px;
      text-decoration: none;
      color: black;
      margin: 2px;
      transition: 0.3s all;
    }

    .btn:hover {
      background-color: #343a40;
      color:white;
    }


    table {
      width: 100%
      background-color: white;
      border-radius: 8px;
      overflow: hidden;
      border-collapse: collapse;
    }

    th {
      background-color: #343a40;
      color: white;
    }

    td,
    th {
      padding: 12px;
      text-align: center;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    /* linha de atendido */
    .atendido {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>Agendamentos</h1>

  <div class="top-bar">
  <a href="/novo/" class="btn">Novo Agendamento</a>
  </div>

  <table>
    <tr>
      <th>Nome</th>
      <th>Horário</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>

    {% for a in agendamentos %}
    <tr class="{% if a.atendido %}atendido{% endif %}">
      <td>{{ a.nome }}</td>
      <td>{{ a.horario|date:"d/m/Y H:i" }}</td>
      <td>
        {% if a.atendido %}
        ✔️
        {% else %}
        ❌
        {% endif %}
      </td>
    
      <td>
        <a href="/editar/{{ a.id }}/" class="btn">Editar</a>
        <a href="/excluir/{{ a.id }}/" class="btn">Excluir</a>
        <a href="/atendido/{{ a.id }}/" class="btn">Atendido</a>
      </td>
    </tr>
    {% endfor %}
  </table>
</div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agendamentos</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      background-color: #f5f6fa;
      font-family: Arial, sans-serif;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 20px;
    }

    table {
      background-color: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background-color: #343a40;
      color: white;
    }

    td,
    th {
      padding: 12px;
      text-align: center;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    /* linha de atendido */
    .atendido {
      opacity: 0.5;
      text-decoration: line-through;
    }

    /* botões */
    .btn {
      padding: 12px 10px;
      background-color: #f2f2f2;
      gap: 6px;
      border-radius: 6px;
      text-decoration: None;
      color: black;
    }

    /* form */
    form {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    /* inputs */
    input {
      width: 100%;
    }
  </style>
</head>

<body>

  <h1>Agendamentos</h1>

  <a href="/novo/" class="btn">Novo Agendamento</a>

  <table>
    <tr>
      <th>Nome</th>
      <th>Horário</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>

    {% for a in agendamentos %}
    <tr class-"{% if a.atendido %}atendido{% endif %}">
      <td>{{ a.nome }}</td>
      <td>{{ a.horario|date:"d/m/Y H:i" }}</td>
      <td>
        {% if a.atendido %}
        ✔️
        {% else %}
        ❌
        {% endif %}
      </td>
    </tr>
    <td>
      <a href="/editar/{{ a.id }}/" class="btn">Editar</a>
      <a href="/excluir/{{ a.id }}/" class="btn">Excluir</a>
      <a href="/atendido/{{ a.id }}/" class="btn">Atendido</a>
    </td>

    {% endfor %}
  </table>

</body>

</html>

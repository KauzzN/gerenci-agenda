<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agendamentos</title>

    <style>
     body {
       font-familly: Arial, sans-serif;
       padding: 20px;
     }

     h1 {
       margin-bottom: 20px;
     }

     a {
       text-decoration: none;
       margin-right: 10px;
     }

     .btn {
       padding: 5px 10px;
       border: 1px solid #ccc;
       border radius: 4px;
       background-color: #f5f5f5;
     }

     .btn:hover {
       background-color: #e0e0e0;
     }

     .btn-danger {
       color: red;
     }

     .btn-success {
       color: green;
     }

     table {
       border-collapse: collapse;
       width: 100%;
       margin-top: 20px;
     }

     th, td {
       padding: 10px;
       border: 1px solid #ccc;
       text-align: left;
     }

     tr.atendido {
       opacity: 0.5;
     }
    </style>
  </head>
  <body>
  
  <h1>Agendamentos</h1>

  <a href="/novo/" class="btn">Novo Agendamento</a>

    <table>
      <tr>
        <th>Nome</th>
        <th>Horário</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>

      {% for a in agendamentos %}
      <tr class-"{% if a.atendido %}atendido{% endif %}">
        <td>{{ a.nome }}</td>
        <td>{{ a.horario }}</td>
        <td>
          {% if a.atendido %}
            ✔️
          {% else %}
            ❌
          {% endif %}
        </td>
      </tr>
      <td>
       <a href="/editar/{{ a.id }}/" class="btn">Editar</a>
       <a href="/excluir/{{ a.id }}/" class="btn">Excluir</a>
       <a href="/atendido/{{ a.id }}/" class="btn">Atendido</a>
      </td>

      {% endfor %}
    </table>

  </body>
</html>
